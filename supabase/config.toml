# Remplace par ton project ref : Supabase Dashboard > Project Settings > General
project_id = "your-project-ref"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://cotizpro.fr"]
jwt_expiry = 3600
enable_refresh_token_rotation = true

[functions.envoyer-rappels]
# Pas de vérification JWT Supabase — on valide via X-Function-Secret
verify_jwt = false
